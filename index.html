<!DOCTYPE html>
<html>
<head>
  <title>AJAX Search Suggestion</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    #suggestions {
      border: 1px solid #ccc;
      max-width: 300px;
      background: #fff;
      position: absolute;
      z-index: 1000;
      display: none;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    #suggestions li {
      padding: 8px;
      cursor: pointer;
    }
    #suggestions li:hover {
      background: #f0f0f0;
    }
  </style>
</head>
<body>
  <h2>Search Box with Suggestions</h2>
  <input type="text" id="searchBox" placeholder="Type to search..." autocomplete="off">
  <ul id="suggestions" role="listbox"></ul>

  <script>
    $(document).ready(function() {
      let timer;

      $("#searchBox").on("keyup", function() {
        clearTimeout(timer);
        let query = $(this).val();

        timer = setTimeout(function() {
          if (query.length > 1) {
            $.ajax({
              url: "search.php",       // backend script
              method: "GET",
              data: { q: query },
              dataType: "json",        // auto-parse JSON
              success: function(suggestions) {
                let suggestionList = "";
                suggestions.forEach(function(item) {
                  suggestionList += "<li role='option'>" + item + "</li>";
                });

                if (suggestions.length > 0) {
                  $("#suggestions").html(suggestionList).show();
                } else {
                  $("#suggestions").hide();
                }
              }
            });
          } else {
            $("#suggestions").hide();
          }
        }, 300); // debounce delay
      });

      // Handle click on suggestion
      $(document).on("click", "#suggestions li", function() {
        $("#searchBox").val($(this).text());
        $("#suggestions").hide();
      });

      // Hide suggestions when clicking outside
      $(document).on("click", function(e) {
        if (!$(e.target).closest("#searchBox, #suggestions").length) {
          $("#suggestions").hide();
        }
      });
    });
  </script>
</body>
</html>
